services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-opencode-hub}:${APP_TAG:-latest}
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      OPENCODE_HUB_PROXY_SECRET: ${OPENCODE_HUB_PROXY_SECRET:-change-this-secret}
      ALLOW_PRIVATE_NETWORK_TARGETS: ${ALLOW_PRIVATE_NETWORK_TARGETS:-false}
      OPENCODE_HUB_STATE_FILE: /app/.opencode-hub/state.json
    volumes:
      - opencode-hub-state:/app/.opencode-hub

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '${DEV_PORT:-5173}:5173'
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      OPENCODE_HUB_PROXY_SECRET: ${OPENCODE_HUB_PROXY_SECRET:-dev-secret-change-me}
      ALLOW_PRIVATE_NETWORK_TARGETS: ${ALLOW_PRIVATE_NETWORK_TARGETS:-false}
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  opencode-hub-state:
