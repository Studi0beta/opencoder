name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-publish:
    runs-on: castanova
    outputs:
      registry: ${{ steps.vars.outputs.registry }}
      image: ${{ steps.vars.outputs.image }}
      sha_tag: ${{ steps.vars.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker is available
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker CLI is not available on this runner."
            echo "Install Docker on the castanova runner or expose /var/run/docker.sock to the runner environment."
            exit 1
          fi

      - name: Set image tags
        id: vars
        run: |
          REGISTRY="${{ secrets.REGISTRY_HOST }}"
          if [ -z "$REGISTRY" ]; then
            REGISTRY="${GITHUB_SERVER_URL#https://}"
          fi

          IMAGE_PATH="${{ secrets.REGISTRY_IMAGE }}"
          if [ -z "$IMAGE_PATH" ]; then
            IMAGE_PATH="${GITHUB_REPOSITORY,,}"
          fi

          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${IMAGE_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Print publish target
        run: |
          echo "Registry: ${{ steps.vars.outputs.registry }}"
          echo "Image:    ${{ steps.vars.outputs.image }}"
          echo "Tag:      ${{ steps.vars.outputs.sha_tag }}"

      - name: Log in to Forgejo registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ steps.vars.outputs.registry }}" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}" \
            -t "${{ steps.vars.outputs.image }}:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}"
          docker push "${{ steps.vars.outputs.image }}:latest"

      - name: Verify image exists in registry
        run: docker manifest inspect "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}" > /dev/null

  deploy:
    needs: docker-publish
    runs-on: castanova
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ needs.docker-publish.outputs.registry }}" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
            APP_IMAGE="${{ needs.docker-publish.outputs.image }}" APP_TAG="${{ needs.docker-publish.outputs.sha_tag }}" docker compose pull app
            APP_IMAGE="${{ needs.docker-publish.outputs.image }}" APP_TAG="${{ needs.docker-publish.outputs.sha_tag }}" docker compose up -d app
            docker image prune -f
