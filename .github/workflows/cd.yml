name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      registry: ${{ steps.vars.outputs.registry }}
      image: ${{ steps.vars.outputs.image }}
      sha_tag: ${{ steps.vars.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image tags
        id: vars
        run: |
          REGISTRY="${{ secrets.REGISTRY_HOST }}"
          if [ -z "$REGISTRY" ]; then
            REGISTRY="ghcr.io"
          fi

          IMAGE_PATH="${{ secrets.REGISTRY_IMAGE }}"
          if [ -z "$IMAGE_PATH" ]; then
            IMAGE_PATH="${GITHUB_REPOSITORY,,}"
          fi

          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${IMAGE_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Print publish target
        run: |
          echo "Registry: ${{ steps.vars.outputs.registry }}"
          echo "Image:    ${{ steps.vars.outputs.image }}"
          echo "Tag:      ${{ steps.vars.outputs.sha_tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.vars.outputs.registry == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to custom registry
        if: steps.vars.outputs.registry != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.vars.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.image }}:latest

      - name: Verify image exists in registry
        run: docker manifest inspect "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}" > /dev/null

  deploy:
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != ''
    steps:
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ needs.docker-publish.outputs.registry }}" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
            APP_IMAGE="${{ needs.docker-publish.outputs.image }}" APP_TAG="${{ needs.docker-publish.outputs.sha_tag }}" docker compose pull app
            APP_IMAGE="${{ needs.docker-publish.outputs.image }}" APP_TAG="${{ needs.docker-publish.outputs.sha_tag }}" docker compose up -d app
            docker image prune -f
